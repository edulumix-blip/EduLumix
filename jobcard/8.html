<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 8 — Dense compact</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; font-family: "IBM Plex Sans", sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 340px; border: 1px solid #d1d5db; border-radius: 4px; padding: 12px 14px;
    }
    .row { display: flex; gap: 10px; align-items: flex-start; }
    .logo { width: 36px; height: 36px; border: 1px solid #d1d5db; border-radius: 2px; display: grid; place-items: center; font-size: 9px; font-weight: 700; color: #374151; flex-shrink: 0; }
    h2 { margin: 0; font-size: 13px; font-weight: 600; color: #111827; line-height: 1.35; }
    .co { margin: 2px 0 0; font-size: 12px; color: #6b7280; }
    .meta { font-size: 11px; color: #9ca3af; margin-top: 6px; }
    .line { height: 1px; background: #e5e7eb; margin: 10px 0; }
    .foot { display: flex; justify-content: space-between; align-items: center; }
    .tags { font-size: 10px; color: #4b5563; }
    .apply { font-size: 11px; font-weight: 600; color: #2563eb; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
  </style>
</head>
<body>
  <article class="card">
    <div class="row">
      <div class="logo">IBM</div>
      <div>
        <h2>Package Consultant — SAP Cloud Integration</h2>
        <p class="co">IBM</p>
        <div class="meta">Coimbatore, TN · Fresher</div>
      </div>
    </div>
    <div class="line"></div>
    <div class="foot">
      <span class="tags">IT Job · Open</span>
      <button type="button" class="apply">Apply →</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#2563eb;">← All demos</a></p>
</body>
</html>
