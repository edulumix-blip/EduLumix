<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 7 — Neumorphic</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #e8ecf1; font-family: Nunito, sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 380px;
      background: #e8ecf1; border-radius: 24px;
      box-shadow: 12px 12px 28px #c5cad1, -12px -12px 28px #ffffff;
      padding: 24px;
    }
    .logo {
      width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 18px;
      display: grid; place-items: center; font-weight: 800; color: #475569; font-size: 15px;
      box-shadow: inset 4px 4px 10px #c5cad1, inset -4px -4px 10px #ffffff;
    }
    h2 { margin: 0; text-align: center; font-size: 17px; font-weight: 800; color: #334155; line-height: 1.35; }
    .co { margin: 8px 0 0; text-align: center; font-size: 15px; font-weight: 700; color: #64748b; }
    .meta { text-align: center; font-size: 13px; color: #94a3b8; margin: 14px 0 18px; }
    .badges { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
    .b {
      font-size: 11px; font-weight: 800; padding: 8px 14px; border-radius: 999px; color: #3b82f6;
      box-shadow: 4px 4px 10px #c5cad1, -4px -4px 10px #ffffff;
    }
    .b2 { color: #10b981; }
    .apply {
      width: 100%; border: none; padding: 14px; border-radius: 16px; font-family: inherit; font-weight: 800; font-size: 14px; color: #475569; cursor: pointer;
      background: #e8ecf1;
      box-shadow: 6px 6px 14px #c5cad1, -6px -6px 14px #ffffff;
    }
    .apply:active { box-shadow: inset 4px 4px 10px #c5cad1, inset -4px -4px 10px #ffffff; }
  </style>
</head>
<body>
  <article class="card">
    <div class="logo">IBM</div>
    <h2>Package Consultant — SAP Cloud Integration</h2>
    <p class="co">IBM</p>
    <div class="meta">Coimbatore · Fresher</div>
    <div class="badges">
      <span class="b">IT Job</span>
      <span class="b b2">Open</span>
    </div>
    <button type="button" class="apply">Apply now</button>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#475569;">← All demos</a></p>
</body>
</html>
