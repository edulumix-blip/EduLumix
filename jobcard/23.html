<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 23 — Bold red stripe</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa; font-family: Archivo, sans-serif; padding: 24px; }
    .card { width: 100%; max-width: 410px; background: #fff; position: relative; box-shadow: 0 16px 48px rgba(0,0,0,.08); }
    .stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; background: #dc2626; }
    .in { margin-left: 8px; padding: 24px 24px 22px 22px; }
    .eyebrow { font-size: 11px; font-weight: 800; letter-spacing: .15em; color: #dc2626; text-transform: uppercase; }
    h1 { margin: 10px 0 0; font-size: 22px; font-weight: 900; color: #171717; line-height: 1.15; text-transform: uppercase; letter-spacing: -.02em; }
    .co { margin: 12px 0 0; font-size: 15px; font-weight: 700; color: #404040; }
    .row { display: flex; flex-wrap: wrap; gap: 20px; margin: 20px 0; padding: 16px 0; border-top: 2px solid #171717; border-bottom: 2px solid #171717; }
    .item strong { display: block; font-size: 20px; font-weight: 900; color: #171717; }
    .item span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #737373; }
    .desc { font-size: 14px; color: #525252; line-height: 1.65; font-weight: 500; margin: 0 0 16px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .t { font-size: 11px; font-weight: 800; padding: 6px 12px; background: #171717; color: #fff; text-transform: uppercase; letter-spacing: .04em; }
    .foot { margin-top: 22px; display: flex; justify-content: space-between; align-items: center; }
    .btn { background: #dc2626; color: #fff; border: none; padding: 14px 28px; font-family: inherit; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; cursor: pointer; }
    .btn:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <article class="card">
    <div class="stripe" aria-hidden="true"></div>
    <div class="in">
      <p class="eyebrow">Hiring now</p>
      <h1>Brand Strategist</h1>
      <p class="co">Redline Agency · Delhi NCR</p>
      <div class="row">
        <div class="item"><span>Salary</span><strong>₹15–22L</strong></div>
        <div class="item"><span>Exp</span><strong>4–7 yrs</strong></div>
        <div class="item"><span>Mode</span><strong>Hybrid</strong></div>
      </div>
      <p class="desc">Pitch decks, positioning sprints, and campaign narratives for fintech and D2C clients. Present to founders; mentor junior copy partners.</p>
      <div class="tags">
        <span class="t">Strategy</span><span class="t">Story</span><span class="t">Workshops</span><span class="t">Analytics</span>
      </div>
      <div class="foot">
        <span style="font-size:12px;font-weight:700;color:#a3a3a3;">Deadline: rolling</span>
        <button type="button" class="btn">Submit</button>
      </div>
    </div>
  </article>
  <p style="position:fixed;bottom:10px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#dc2626;font-weight:700;">← All demos</a></p>
</body>
</html>
