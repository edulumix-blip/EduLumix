<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 11 — Corporate navy</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f4f6f8; font-family: "Source Sans 3", sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 400px; background: #fff; border-radius: 2px;
      border-top: 4px solid #0a1628; box-shadow: 0 4px 24px rgba(10,22,40,.08);
    }
    .head { padding: 18px 24px 12px; background: #0a1628; color: #fff; }
    .head small { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: #94a3b8; font-weight: 600; }
    .head h2 { margin: 8px 0 0; font-family: "Source Serif 4", Georgia, serif; font-size: 19px; font-weight: 700; line-height: 1.3; }
    .body { padding: 20px 24px; }
    .co { font-size: 15px; font-weight: 700; color: #0a1628; margin-bottom: 10px; }
    .meta { font-size: 13px; color: #64748b; line-height: 1.5; margin-bottom: 16px; }
    .badges { display: flex; gap: 10px; flex-wrap: wrap; }
    .b { font-size: 11px; font-weight: 700; padding: 4px 0; border-bottom: 2px solid #c9a227; color: #0a1628; }
    .b2 { border-color: #0a1628; }
    .foot { padding: 16px 24px 22px; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .apply { background: #0a1628; color: #fff; border: none; padding: 11px 24px; font-family: inherit; font-weight: 700; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; }
    .apply:hover { background: #1e3a5f; }
  </style>
</head>
<body>
  <article class="card">
    <header class="head">
      <small>Featured opening</small>
      <h2>Package Consultant — SAP Cloud Integration</h2>
    </header>
    <div class="body">
      <p class="co">IBM</p>
      <p class="meta">Coimbatore, Tamil Nadu · Suitable for fresh graduates</p>
      <div class="badges">
        <span class="b">Information technology</span>
        <span class="b b2">Applications accepted</span>
      </div>
    </div>
    <div class="foot">
      <span style="font-size:12px;color:#94a3b8;">Ref. EDU-IBM-01</span>
      <button type="button" class="apply">Submit application</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#0a1628;">← All demos</a></p>
</body>
</html>
