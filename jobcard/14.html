<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 14 — Luxury gold</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #080808; font-family: Outfit, sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 400px; background: linear-gradient(165deg, #14120f 0%, #0d0c0a 100%);
      border-radius: 4px; border: 1px solid #3d3528; box-shadow: 0 0 0 1px rgba(212,175,55,.15), 0 32px 64px -16px rgba(0,0,0,.8);
      position: relative; overflow: hidden;
    }
    .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #8b7355, #d4af37, #f4e4bc, #d4af37, #8b7355); }
    .in { padding: 26px 24px 22px; }
    .eyebrow { font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: #a8906a; font-weight: 600; }
    h1 { margin: 10px 0 0; font-family: "Cormorant Garamond", serif; font-size: 26px; font-weight: 700; color: #f5f0e6; line-height: 1.2; }
    .co { margin: 12px 0 0; font-size: 14px; color: #c4b59a; font-weight: 500; }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,.4), transparent); margin: 20px 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .item label { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: #7d6b52; display: block; margin-bottom: 4px; }
    .item span { font-size: 14px; color: #e8dcc8; font-weight: 600; }
    .skills { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 8px; }
    .sk { font-size: 11px; padding: 6px 12px; border: 1px solid #4a4234; color: #d4c4a8; border-radius: 2px; }
    .desc { font-size: 13px; color: #9a8b76; line-height: 1.65; margin: 18px 0 0; font-style: italic; font-family: "Cormorant Garamond", serif; font-size: 16px; }
    .foot { padding: 18px 24px 24px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #2a261f; }
    .salary { font-family: "Cormorant Garamond", serif; font-size: 22px; color: #d4af37; font-weight: 700; }
    .btn { background: #d4af37; color: #1a1510; border: none; padding: 12px 28px; font-family: Outfit, sans-serif; font-weight: 700; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; }
    .btn:hover { background: #f4e4bc; }
  </style>
</head>
<body>
  <article class="card">
    <div class="in">
      <p class="eyebrow">Exclusive listing</p>
      <h1>Lead Product Designer</h1>
      <p class="co">Aurum Capital Partners · Fintech · Permanent</p>
      <div class="divider"></div>
      <div class="grid">
        <div class="item"><label>Package</label><span>₹22–35 LPA</span></div>
        <div class="item"><label>Tenure</label><span>5–8 yrs exp.</span></div>
        <div class="item"><label>Work mode</label><span>Mumbai · Hybrid</span></div>
        <div class="item"><label>Closing</label><span>Mar 30, 2026</span></div>
      </div>
      <p class="desc">“Craft investor-grade dashboards and onboarding flows. Research-led; design QA with engineering weekly.”</p>
      <div class="skills">
        <span class="sk">Figma</span><span class="sk">Design ops</span><span class="sk">WCAG 2.2</span><span class="sk">B2B SaaS</span>
      </div>
    </div>
    <div class="foot">
      <span class="salary">₹22L+</span>
      <button type="button" class="btn">Request intro</button>
    </div>
  </article>
  <p style="position:fixed;bottom:10px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#d4af37;">← All demos</a></p>
</body>
</html>
