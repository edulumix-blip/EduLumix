<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 19 — Aurora glass</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Manrope, sans-serif; padding: 24px;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse 100% 80% at 50% -20%, rgba(139,92,246,.45), transparent),
        radial-gradient(ellipse 60% 50% at 100% 50%, rgba(236,72,153,.25), transparent),
        radial-gradient(ellipse 50% 40% at 0% 80%, rgba(34,211,238,.2), transparent);
    }
    .card {
      width: 100%; max-width: 400px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.1);
      padding: 24px;
    }
    .top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .logo { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.05)); border: 1px solid rgba(255,255,255,.2); display: grid; place-items: center; font-weight: 800; color: #fff; font-size: 13px; }
    h1 { margin: 0; font-size: 18px; font-weight: 800; color: #fff; line-height: 1.3; letter-spacing: -.02em; }
    .co { margin: 6px 0 0; font-size: 13px; color: rgba(255,255,255,.65); font-weight: 600; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 18px 0; }
    .box { background: rgba(0,0,0,.2); border-radius: 14px; padding: 12px 14px; border: 1px solid rgba(255,255,255,.08); }
    .box label { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.45); font-weight: 600; }
    .box .v { display: block; margin-top: 6px; font-size: 14px; font-weight: 700; color: #fff; }
    .box.wide { grid-column: span 2; }
    .desc { font-size: 13px; color: rgba(255,255,255,.7); line-height: 1.6; margin: 0 0 16px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .t { font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 999px; background: rgba(167,139,250,.2); color: #e9d5ff; border: 1px solid rgba(167,139,250,.3); }
    .foot { margin-top: 20px; display: flex; gap: 10px; }
    .btn { flex: 1; padding: 14px; border-radius: 14px; font-weight: 800; font-size: 13px; cursor: pointer; font-family: inherit; border: none; }
    .btn-p { background: linear-gradient(135deg, #a78bfa, #ec4899); color: #fff; }
    .btn-g { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.2); }
  </style>
</head>
<body>
  <article class="card">
    <div class="top">
      <div class="logo">VR</div>
      <div>
        <h1>AR/VR Software Engineer</h1>
        <p class="co">Vertex Realities · Gaming / Metaverse</p>
      </div>
    </div>
    <div class="grid">
      <div class="box"><label>Salary</label><span class="v">₹20–32 LPA</span></div>
      <div class="box"><label>Level</label><span class="v">L4–L5</span></div>
      <div class="box wide"><label>Location</label><span class="v">Remote (India) · overlap 11am–4pm IST</span></div>
    </div>
    <p class="desc">Ship Unity/Unreal tooling, shader perf, and multiplayer sync. Portfolio link required; 4-day work week pilot team.</p>
    <div class="tags">
      <span class="t">Unity</span><span class="t">C#</span><span class="t">HLSL</span><span class="t">Netcode</span>
    </div>
    <div class="foot">
      <button type="button" class="btn btn-g">Details</button>
      <button type="button" class="btn btn-p">Apply</button>
    </div>
  </article>
  <p style="position:fixed;bottom:10px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#e9d5ff;">← All demos</a></p>
</body>
</html>
