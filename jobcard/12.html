<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 12 — Magazine split</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa; font-family: Manrope, sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 420px; display: grid; grid-template-columns: 1fr 1fr; border-radius: 0; overflow: hidden;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,.15); min-height: 220px;
    }
    .visual {
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      padding: 24px; display: flex; flex-direction: column; justify-content: space-between; color: #e94560;
    }
    .visual .logo { font-family: Fraunces, serif; font-size: 28px; font-weight: 700; color: #fff; line-height: 1; }
    .visual .tag { font-size: 10px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.5); }
    .content { background: #fff; padding: 22px 20px; display: flex; flex-direction: column; justify-content: center; }
    h2 { margin: 0; font-family: Fraunces, serif; font-size: 18px; font-weight: 700; color: #1a1a2e; line-height: 1.25; }
    .co { margin: 10px 0 0; font-size: 13px; font-weight: 600; color: #e94560; }
    .meta { margin: 12px 0 16px; font-size: 12px; color: #64748b; line-height: 1.45; }
    .apply {
      align-self: flex-start; background: #1a1a2e; color: #fff; border: none; padding: 10px 18px;
      font-family: inherit; font-weight: 600; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
    }
    .apply:hover { background: #e94560; }
    @media (max-width: 440px) {
      .card { grid-template-columns: 1fr; }
      .visual { min-height: 120px; }
    }
  </style>
</head>
<body>
  <article class="card">
    <div class="visual">
      <span class="tag">Careers</span>
      <div class="logo">IBM</div>
    </div>
    <div class="content">
      <h2>Package Consultant — SAP Cloud Integration</h2>
      <p class="co">IBM</p>
      <p class="meta">Coimbatore · Fresher · IT</p>
      <button type="button" class="apply">Apply</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#1a1a2e;">← All demos</a></p>
</body>
</html>
