<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 9 — Material shadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #eceff1; font-family: Roboto, sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 380px; background: #fff; border-radius: 4px;
      box-shadow: 0 2px 4px rgba(0,0,0,.14), 0 3px 4px rgba(0,0,0,.12), 0 1px 5px rgba(0,0,0,.2);
      overflow: hidden;
    }
    .body { padding: 20px 20px 16px; }
    .row { display: flex; gap: 16px; align-items: flex-start; }
    .logo { width: 56px; height: 56px; border-radius: 4px; background: #e3f2fd; color: #1565c0; display: grid; place-items: center; font-weight: 700; font-size: 14px; }
    h2 { margin: 0; font-size: 16px; font-weight: 500; color: rgba(0,0,0,.87); line-height: 1.4; letter-spacing: .01em; }
    .co { margin: 6px 0 0; font-size: 14px; color: rgba(0,0,0,.6); font-weight: 400; }
    .meta { font-size: 13px; color: rgba(0,0,0,.54); margin-top: 12px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    .chip { font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 16px; background: #f5f5f5; color: rgba(0,0,0,.7); }
    .chip2 { background: #e8f5e9; color: #2e7d32; }
    .actions { padding: 8px 8px 8px 16px; display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid rgba(0,0,0,.08); }
    .btn { border: none; background: transparent; color: #6200ee; font-weight: 500; font-size: 14px; padding: 8px 12px; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: .08em; font-size: 12px; }
    .btn:hover { background: rgba(98,0,238,.08); }
    .btn-fill { background: #6200ee; color: #fff; }
    .btn-fill:hover { background: #3700b3; }
  </style>
</head>
<body>
  <article class="card">
    <div class="body">
      <div class="row">
        <div class="logo">IBM</div>
        <div>
          <h2>Package Consultant — SAP Cloud Integration</h2>
          <p class="co">IBM</p>
          <div class="meta">Coimbatore, Tamil Nadu · Fresher</div>
          <div class="chips">
            <span class="chip">IT Job</span>
            <span class="chip chip2">Application open</span>
          </div>
        </div>
      </div>
    </div>
    <div class="actions">
      <button type="button" class="btn">Share</button>
      <button type="button" class="btn btn-fill">Apply</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#6200ee;">← All demos</a></p>
</body>
</html>
