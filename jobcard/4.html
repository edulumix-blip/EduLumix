<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 4 — Left accent bar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #eef2ff; font-family: Inter, sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 380px; background: #fff; border-radius: 12px; border: 1px solid #e0e7ff;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,.06); display: flex; overflow: hidden;
    }
    .accent { width: 5px; background: linear-gradient(180deg, #4f46e5, #7c3aed, #db2777); flex-shrink: 0; }
    .inner { flex: 1; padding: 18px 20px 0; }
    .row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .logo { width: 48px; height: 48px; border-radius: 10px; background: #f5f3ff; color: #5b21b6; display: grid; place-items: center; font-weight: 800; font-size: 11px; }
    h2 { margin: 0; font-size: 16px; font-weight: 700; color: #1e1b4b; line-height: 1.35; }
    .co { margin: 4px 0 0; font-size: 13px; color: #6366f1; font-weight: 600; }
    .meta { font-size: 12px; color: #64748b; margin-bottom: 12px; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .b { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 4px 8px; border-radius: 4px; background: #e0e7ff; color: #4338ca; }
    .b2 { background: #d1fae5; color: #047857; }
    .foot { padding: 12px 20px 16px; margin: 0 -20px 0; background: #faf5ff; border-top: 1px solid #ede9fe; display: flex; justify-content: space-between; align-items: center; }
    .apply { background: #4f46e5; color: #fff; border: none; padding: 9px 16px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>
  <article class="card">
    <div class="accent" aria-hidden="true"></div>
    <div style="flex:1;display:flex;flex-direction:column;">
      <div class="inner">
        <div class="row">
          <div class="logo">IBM</div>
          <div>
            <h2>Package Consultant — SAP Cloud Integration</h2>
            <p class="co">IBM</p>
          </div>
        </div>
        <div class="meta">Coimbatore, TN · Fresher</div>
        <div class="badges">
          <span class="b">IT Job</span>
          <span class="b b2">Open</span>
        </div>
      </div>
      <div class="foot">
        <span style="font-size:12px;color:#6b7280;">Share</span>
        <button type="button" class="apply">Apply →</button>
      </div>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#4f46e5;">← All demos</a></p>
</body>
</html>
