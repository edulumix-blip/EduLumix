<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 26 — iOS frosted</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 24px;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 40%, #f093fb 100%);
    }
    .card {
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,.72);
      backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.5);
      box-shadow: 0 25px 50px rgba(0,0,0,.15);
      padding: 20px 20px 18px;
    }
    .caps { font-size: 11px; font-weight: 600; color: rgba(0,0,0,.45); text-transform: uppercase; letter-spacing: .06em; }
    h1 { margin: 6px 0 0; font-size: 20px; font-weight: 700; color: #000; letter-spacing: -.02em; line-height: 1.25; }
    .co { margin: 8px 0 0; font-size: 15px; font-weight: 600; color: rgba(0,0,0,.55); }
    .sep { height: 1px; background: rgba(0,0,0,.08); margin: 16px 0; }
    .rows { display: flex; flex-direction: column; gap: 12px; }
    .r { display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
    .r span:first-child { color: rgba(0,0,0,.45); }
    .r span:last-child { font-weight: 600; color: #000; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .t { font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: 999px; background: rgba(0,0,0,.06); color: #000; }
    .desc { font-size: 14px; color: rgba(0,0,0,.55); line-height: 1.5; margin: 14px 0 0; }
    .foot { margin-top: 18px; display: flex; gap: 12px; }
    .btn { flex: 1; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
    .btn-p { background: #007aff; color: #fff; }
    .btn-s { background: rgba(0,0,0,.06); color: #000; }
  </style>
</head>
<body>
  <article class="card">
    <p class="caps">Recommended for you</p>
    <h1>iOS Engineer — SwiftUI</h1>
    <p class="co">Pulse Health · Subscription app</p>
    <div class="sep"></div>
    <div class="rows">
      <div class="r"><span>Salary</span><span>₹22–34 LPA</span></div>
      <div class="r"><span>Location</span><span>Bangalore</span></div>
      <div class="r"><span>Experience</span><span>3–6 years</span></div>
      <div class="r"><span>Posted</span><span>Today</span></div>
    </div>
    <div class="tags">
      <span class="t">Swift</span><span class="t">Combine</span><span class="t">TCA</span><span class="t">CI</span>
    </div>
    <p class="desc">Ship features for vitals tracking and CareKit integrations. Unit/UI tests required; design pairing twice a sprint.</p>
    <div class="foot">
      <button type="button" class="btn btn-s">Hide</button>
      <button type="button" class="btn btn-p">Apply</button>
    </div>
  </article>
  <p style="position:fixed;bottom:10px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#fff;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.3);">← All demos</a></p>
</body>
</html>
