<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 2 — Dark pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #030712; font-family: "Plus Jakarta Sans", sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 380px; background: linear-gradient(145deg, #111827 0%, #0f172a 100%);
      border-radius: 16px; border: 1px solid rgba(56,189,248,.25); box-shadow: 0 0 0 1px rgba(0,0,0,.5), 0 20px 50px -20px rgba(34,211,238,.15);
      overflow: hidden;
    }
    .body { padding: 20px; }
    .row { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 14px; }
    .logo { width: 52px; height: 52px; border-radius: 14px; background: rgba(34,211,238,.1); border: 1px solid rgba(34,211,238,.2); display: grid; place-items: center; color: #22d3ee; font-weight: 700; font-size: 12px; }
    h2 { margin: 0; font-size: 16px; font-weight: 700; color: #f8fafc; line-height: 1.4; }
    .co { margin: 6px 0 0; font-size: 13px; color: #94a3b8; font-weight: 500; }
    .meta { font-size: 12px; color: #64748b; margin-bottom: 14px; line-height: 1.5; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .b { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 8px; }
    .b1 { background: rgba(59,130,246,.2); color: #93c5fd; }
    .b2 { background: rgba(34,197,94,.15); color: #86efac; }
    .foot { padding: 14px 20px; background: rgba(0,0,0,.35); border-top: 1px solid rgba(148,163,184,.12); display: flex; justify-content: space-between; align-items: center; }
    .apply { background: linear-gradient(135deg, #22d3ee, #3b82f6); color: #030712; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; }
    .muted { font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <article class="card">
    <div class="body">
      <div class="row">
        <div class="logo">IBM</div>
        <div>
          <h2>Package Consultant — SAP Cloud Integration</h2>
          <p class="co">IBM</p>
        </div>
      </div>
      <div class="meta">Coimbatore, Tamil Nadu · Fresher</div>
      <div class="badges">
        <span class="b b1">IT Job</span>
        <span class="b b2">Application Open</span>
      </div>
    </div>
    <div class="foot">
      <span class="muted">♡ 12 · 👁 340</span>
      <button type="button" class="apply">Apply →</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#22d3ee;">← All demos</a></p>
</body>
</html>
