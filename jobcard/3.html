<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 3 — Glassmorphism</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: Inter, sans-serif; padding: 24px;
      background: url("https://images.unsplash.com/photo-1557682250-33bd709cbe85?w=1200&q=80") center/cover fixed;
    }
    .card {
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,.14);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 20px; border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .body { padding: 22px; }
    .row { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 14px; }
    .logo { width: 54px; height: 54px; border-radius: 50%; background: rgba(255,255,255,.35); display: grid; place-items: center; font-weight: 800; color: #1e3a5f; font-size: 13px; border: 2px solid rgba(255,255,255,.5); }
    h2 { margin: 0; font-size: 17px; font-weight: 700; color: #0f172a; text-shadow: 0 1px 0 rgba(255,255,255,.5); line-height: 1.35; }
    .co { margin: 6px 0 0; font-size: 14px; font-weight: 600; color: #334155; }
    .meta { font-size: 13px; color: #475569; margin-bottom: 14px; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .b { font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 999px; background: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.5); color: #1e40af; }
    .b2 { color: #166534; }
    .foot { padding: 14px 22px; background: rgba(255,255,255,.2); border-top: 1px solid rgba(255,255,255,.3); display: flex; justify-content: space-between; align-items: center; }
    .apply { background: rgba(37,99,235,.9); color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; box-shadow: 0 4px 14px rgba(37,99,235,.4); }
  </style>
</head>
<body>
  <article class="card">
    <div class="body">
      <div class="row">
        <div class="logo">IBM</div>
        <div>
          <h2>Package Consultant — SAP Cloud Integration</h2>
          <p class="co">IBM</p>
        </div>
      </div>
      <div class="meta">📍 Coimbatore · 🕐 Fresher</div>
      <div class="badges">
        <span class="b">IT Job</span>
        <span class="b b2">Open</span>
      </div>
    </div>
    <div class="foot">
      <span style="font-size:12px;color:#475569;">♡ 0</span>
      <button type="button" class="apply">Apply →</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#fff;text-shadow:0 1px 4px #000;">← All demos</a></p>
</body>
</html>
