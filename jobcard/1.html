<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 1 — Classic clean</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f1f5f9; font-family: Inter, sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 380px; background: #fff; border-radius: 16px; border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; transition: box-shadow .2s, border-color .2s;
    }
    .card:hover { box-shadow: 0 12px 40px -12px rgba(37,99,235,.2); border-color: #bfdbfe; }
    .body { padding: 20px; }
    .row { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; }
    .logo { width: 56px; height: 56px; border-radius: 12px; background: #f1f5f9; border: 1px solid #e2e8f0; display: grid; place-items: center; font-weight: 700; color: #64748b; font-size: 14px; }
    h2 { margin: 0; font-size: 17px; font-weight: 700; color: #0f172a; line-height: 1.35; }
    .co { margin: 6px 0 0; font-size: 14px; font-weight: 500; color: #475569; }
    .meta { font-size: 13px; color: #64748b; display: flex; flex-wrap: wrap; gap: 8px 12px; margin-bottom: 14px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .b { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 999px; }
    .b1 { background: #dbeafe; color: #1d4ed8; }
    .b2 { background: #dcfce7; color: #15803d; }
    .foot { padding: 14px 20px; background: #f8fafc; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .apply { background: #2563eb; color: #fff; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 13px; cursor: pointer; }
    .apply:hover { background: #1d4ed8; }
    .muted { font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <article class="card">
    <div class="body">
      <div class="row">
        <div class="logo">IBM</div>
        <div>
          <h2>Package Consultant — SAP Cloud Integration</h2>
          <p class="co">IBM</p>
        </div>
      </div>
      <div class="meta">📍 Coimbatore, Tamil Nadu · 🕐 Fresher</div>
      <div class="badges">
        <span class="b b1">IT Job</span>
        <span class="b b2">Application Open</span>
      </div>
    </div>
    <div class="foot">
      <span class="muted">♡ 0 · 👁 0</span>
      <button type="button" class="apply">Apply →</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;color:#64748b;"><a href="index.html" style="color:#2563eb;">← All demos</a></p>
</body>
</html>
