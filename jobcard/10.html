<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 10 — Startup playful</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fef3c7; font-family: "Space Grotesk", sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 380px; background: #fffbeb; border-radius: 24px; border: 3px solid #0f172a;
      box-shadow: 6px 6px 0 #0f172a; transform: rotate(-0.5deg); transition: transform .15s, box-shadow .15s;
    }
    .card:hover { transform: rotate(0deg); box-shadow: 8px 8px 0 #f59e0b; }
    .body { padding: 22px; }
    .row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .logo {
      width: 52px; height: 52px; border-radius: 12px; background: #fbbf24; border: 3px solid #0f172a;
      display: grid; place-items: center; font-weight: 800; color: #0f172a; font-size: 12px;
    }
    h2 { margin: 0; font-size: 17px; font-weight: 700; color: #0f172a; line-height: 1.25; }
    .co { margin: 6px 0 0; font-size: 14px; font-weight: 600; color: #b45309; }
    .meta { font-size: 13px; color: #78350f; margin-bottom: 14px; font-weight: 500; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .b { font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 999px; border: 2px solid #0f172a; background: #fff; color: #0f172a; }
    .b2 { background: #a7f3d0; }
    .foot { padding: 14px 22px 20px; display: flex; justify-content: space-between; align-items: center; }
    .apply {
      background: #0f172a; color: #fbbf24; border: 3px solid #0f172a; padding: 10px 22px; border-radius: 999px;
      font-weight: 800; font-size: 13px; cursor: pointer; font-family: inherit;
    }
    .apply:hover { background: #fbbf24; color: #0f172a; }
  </style>
</head>
<body>
  <article class="card">
    <div class="body">
      <div class="row">
        <div class="logo">IBM</div>
        <div>
          <h2>Package Consultant — SAP Cloud Integration</h2>
          <p class="co">IBM</p>
        </div>
      </div>
      <div class="meta">📍 Coimbatore · 🚀 Fresher</div>
      <div class="badges">
        <span class="b">IT Job</span>
        <span class="b b2">Open!</span>
      </div>
    </div>
    <div class="foot">
      <span style="font-size:12px;font-weight:700;color:#0f172a;">Let’s go</span>
      <button type="button" class="apply">Apply →</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#0f172a;font-weight:700;">← All demos</a></p>
</body>
</html>
