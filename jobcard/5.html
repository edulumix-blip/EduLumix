<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 5 — Horizontal strip</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa; font-family: "DM Sans", sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 520px; background: #fff; border-radius: 14px; border: 1px solid #e5e5e5;
      box-shadow: 0 2px 8px rgba(0,0,0,.04); display: flex; align-items: stretch; overflow: hidden;
    }
    .logo-wrap { padding: 20px; display: flex; align-items: center; background: linear-gradient(135deg, #f5f5f5, #fff); border-right: 1px solid #eee; }
    .logo { width: 64px; height: 64px; border-radius: 12px; background: #fff; border: 1px solid #e5e5e5; display: grid; place-items: center; font-weight: 800; color: #404040; font-size: 14px; }
    .mid { flex: 1; padding: 18px 20px; min-width: 0; }
    h2 { margin: 0; font-size: 15px; font-weight: 700; color: #171717; line-height: 1.35; }
    .co { margin: 4px 0 8px; font-size: 13px; color: #737373; font-weight: 500; }
    .meta { font-size: 12px; color: #a3a3a3; }
    .badges { margin-top: 10px; display: flex; gap: 6px; }
    .b { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 4px; background: #eff6ff; color: #2563eb; }
    .b2 { background: #ecfdf5; color: #059669; }
    .side { padding: 16px 20px; display: flex; flex-direction: column; justify-content: center; gap: 8px; background: #fafafa; border-left: 1px solid #eee; }
    .apply { background: #171717; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 12px; cursor: pointer; white-space: nowrap; }
    .ghost { background: transparent; color: #525252; border: 1px solid #d4d4d4; padding: 8px 14px; border-radius: 8px; font-weight: 600; font-size: 11px; cursor: pointer; }
    @media (max-width: 560px) {
      .card { flex-direction: column; }
      .logo-wrap { border-right: none; border-bottom: 1px solid #eee; justify-content: center; }
      .side { flex-direction: row; border-left: none; border-top: 1px solid #eee; }
    }
  </style>
</head>
<body>
  <article class="card">
    <div class="logo-wrap">
      <div class="logo">IBM</div>
    </div>
    <div class="mid">
      <h2>Package Consultant — SAP Cloud Integration</h2>
      <p class="co">IBM</p>
      <div class="meta">Coimbatore · Fresher</div>
      <div class="badges">
        <span class="b">IT Job</span>
        <span class="b b2">Open</span>
      </div>
    </div>
    <div class="side">
      <button type="button" class="apply">Apply</button>
      <button type="button" class="ghost">Save</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#171717;">← All demos</a></p>
</body>
</html>
