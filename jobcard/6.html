<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo 6 — Gradient top</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0c0a09; font-family: Outfit, sans-serif; padding: 24px; }
    .card {
      width: 100%; max-width: 380px; background: #1c1917; border-radius: 18px; overflow: hidden;
      border: 1px solid #292524; box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
    }
    .top { height: 6px; background: linear-gradient(90deg, #f97316, #ec4899, #8b5cf6); }
    .body { padding: 22px 20px 18px; }
    .row { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; }
    .logo { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #44403c, #292524); border: 1px solid #44403c; display: grid; place-items: center; color: #fdba74; font-weight: 800; font-size: 13px; }
    h2 { margin: 0; font-size: 17px; font-weight: 700; color: #fafaf9; line-height: 1.35; }
    .co { margin: 6px 0 0; font-size: 14px; color: #a8a29e; font-weight: 500; }
    .meta { font-size: 13px; color: #78716c; margin: 12px 0 14px; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .b { font-size: 11px; font-weight: 600; padding: 5px 11px; border-radius: 999px; background: rgba(249,115,22,.15); color: #fdba74; border: 1px solid rgba(249,115,22,.25); }
    .b2 { background: rgba(16,185,129,.12); color: #6ee7b7; border-color: rgba(16,185,129,.2); }
    .foot { padding: 16px 20px; background: #0c0a09; border-top: 1px solid #292524; display: flex; justify-content: space-between; align-items: center; }
    .apply { background: linear-gradient(135deg, #f97316, #ec4899); color: #fff; border: none; padding: 11px 22px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
  <article class="card">
    <div class="top" aria-hidden="true"></div>
    <div class="body">
      <div class="row">
        <div class="logo">IBM</div>
        <div>
          <h2>Package Consultant — SAP Cloud Integration</h2>
          <p class="co">IBM</p>
        </div>
      </div>
      <div class="meta">Coimbatore, Tamil Nadu · Fresher</div>
      <div class="badges">
        <span class="b">IT Job</span>
        <span class="b b2">Application Open</span>
      </div>
    </div>
    <div class="foot">
      <span style="font-size:12px;color:#57534e;">Hot role</span>
      <button type="button" class="apply">Apply →</button>
    </div>
  </article>
  <p style="position:fixed;bottom:8px;left:16px;font:12px system-ui;"><a href="index.html" style="color:#fdba74;">← All demos</a></p>
</body>
</html>
