<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-adsense-account" content="ca-pub-7891482727332744" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags - EduLumix brand + keywords -->
    <meta name="description" content="EduLumix - India's #1 Career Platform for Freshers. Fresher Jobs, Free Study Resources, Online Courses, Mock Tests & Tech Blog. Join 50,000+ students." />
    <meta name="keywords" content="EduLumix, edulumix, fresher jobs, jobs for freshers, free resources, courses, tech blog, mock tests, career platform, job portal India, placement preparation, EduLumix.in" />
    <meta name="author" content="EduLumix" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="1 days" />
    <meta name="rating" content="general" />
    
    <!-- Geo Tags -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    
    <!-- Performance & PWA -->
    <meta name="theme-color" content="#3b82f6" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Fonts: single request, fewer weights; no duplicate @import in CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet"></noscript>
    
    <title>EduLumix - Fresher Jobs, Free Resources, Courses & Mock Tests | Career Platform</title>
    
    <!-- JSON-LD for Google (Organization + WebSite) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "EduLumix",
      "alternateName": ["Edu Lumix", "Edu lumix", "edulumix", "EDULUMIX", "EduLumix.in", "edulumix.in"],
      "url": "https://edulumix.in",
      "logo": "https://edulumix.in/favicon.svg",
      "description": "EduLumix - India's career platform for freshers. Jobs, free resources, courses, mock tests & tech blog.",
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "EduLumix",
      "alternateName": ["Edu Lumix", "edulumix", "EduLumix.in"],
      "url": "https://edulumix.in",
      "description": "India's #1 Career Platform for Freshers - Jobs, Free Resources, Courses, Mock Tests & Tech Blog.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://edulumix.in/jobs?search={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "hasPart": [
        {
          "@type": "SiteNavigationElement",
          "name": "Fresher Jobs",
          "url": "https://edulumix.in/jobs",
          "description": "Explore fresher jobs, internships, and career opportunities in India"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Free Resources",
          "url": "https://edulumix.in/resources",
          "description": "Free study materials, notes, and learning resources"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Courses",
          "url": "https://edulumix.in/courses",
          "description": "Online courses for skill development and career growth"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Tech Blog",
          "url": "https://edulumix.in/blog",
          "description": "Tech tutorials, career tips, and programming guides"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "About Us",
          "url": "https://edulumix.in/about",
          "description": "Learn about EduLumix - India's career platform for freshers"
        },
        {
          "@type": "SiteNavigationElement",
          "name": "Contact Us",
          "url": "https://edulumix.in/contact",
          "description": "Get in touch with EduLumix support team"
        }
      ]
    }
    </script>
    <!-- AdSense: loaded after load+idle from App (see loadAdsense.js) -->
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
